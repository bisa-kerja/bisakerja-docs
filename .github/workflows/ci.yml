name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  validate:
    name: Validate Docs Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Normalize synced docs (.md -> .mdx)
        run: bun run docs:normalize-synced

      - name: Verify synced docs payload
        run: bun run docs:verify-synced

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

      - name: Check formatting
        run: bun run format:check

      - name: Build site
        run: bun run build
